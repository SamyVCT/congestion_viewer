name: Hourly Flow Forecast Update

on:
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 of every hour
  workflow_dispatch: # Adds a button in GitHub UI to trigger it manually for testing

permissions:
  contents: write # Allows the action to push code back to the repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # pip install entsoe-py scikit-learn pandas requests
          echo "Install your python requirements here"

      # - name: Run Inference Script
      #   run: python generate_forecast.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add public/forecast.json
          # Only commit if the data has actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update hourly flow forecast" && git push)